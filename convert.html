<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dynamics Email Converter - Static</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', "Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              mono: ['"JetBrains Mono"', "SFMono-Regular", "ui-monospace", "monospace"]
            },
            colors: {
              ink: "#f8fafc",
              muted: "#cbd5e1",
              line: "rgba(255,255,255,0.12)",
              panel: "rgba(8,13,25,0.72)",
              accent: "#67e8f9",
              accentSoft: "rgba(103,232,249,0.10)"
            },
            boxShadow: {
              soft: "0 24px 80px rgba(0, 0, 0, 0.34)",
              control: "0 14px 38px rgba(103, 232, 249, 0.22)"
            }
          }
        }
      };
    </script>
    <style>
      @keyframes drift {
        to {
          transform: translate3d(6vw, 4vh, 0) scale(1.08);
        }
      }

      .background-container {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .gradients-container {
        position: absolute;
        inset: -20%;
        opacity: 0.52;
        filter: blur(72px);
      }

      .gradient-orb {
        position: absolute;
        width: 34vw;
        min-width: 260px;
        aspect-ratio: 1;
        border-radius: 999px;
        mix-blend-mode: screen;
        animation: drift 18s ease-in-out infinite alternate;
      }

      .gradient-orb-1 {
        left: 4%;
        top: 8%;
        background: #14b8a6;
      }

      .gradient-orb-2 {
        right: 8%;
        top: 6%;
        background: #6366f1;
        animation-delay: -4s;
      }

      .gradient-orb-3 {
        left: 30%;
        bottom: 4%;
        background: #f59e0b;
        animation-delay: -8s;
      }

      .gradient-orb-4 {
        right: 18%;
        bottom: 18%;
        background: #ec4899;
        animation-delay: -12s;
      }

      .gradient-orb-5 {
        left: 50%;
        top: 28%;
        background: #38bdf8;
        animation-delay: -16s;
      }

      .bottom-gradient {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        height: 24vh;
        background: linear-gradient(to top, rgba(20, 184, 166, 0.2), transparent);
      }

      .bottom-glow-orb {
        position: absolute;
        bottom: -20vh;
        left: 50%;
        width: min(760px, 90vw);
        height: 34vh;
        border-radius: 50%;
        background: rgba(45, 212, 191, 0.22);
        filter: blur(56px);
        transform: translateX(-50%);
      }
    </style>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  </head>
  <body class="min-h-screen overflow-x-hidden bg-[radial-gradient(circle_at_50%_100%,rgba(20,184,166,0.18),transparent_34%),linear-gradient(135deg,#070a12_0%,#111827_48%,#1a1024_100%)] font-sans text-ink antialiased">
    <div class="background-container">
      <div class="gradients-container">
        <div class="gradient-orb gradient-orb-1"></div>
        <div class="gradient-orb gradient-orb-2"></div>
        <div class="gradient-orb gradient-orb-3"></div>
        <div class="gradient-orb gradient-orb-4"></div>
        <div class="gradient-orb gradient-orb-5"></div>
      </div>
      <div class="bottom-gradient"></div>
      <div class="bottom-glow-orb"></div>
    </div>

    <main class="relative z-10 mx-auto flex min-h-screen max-w-[1440px] flex-col gap-8 px-5 py-7 lg:px-10">
      <header class="flex flex-col gap-5 pb-2 lg:flex-row lg:items-start lg:justify-between">
        <div>
          <a href="https://pattens.tech" class="inline-flex items-center">
            <img src="./assets/pattens-white.svg" alt="Pattens Logo" class="h-auto w-[180px] max-w-[42vw]">
          </a>
          <h1 class="mt-12 max-w-4xl text-[clamp(2.5rem,2.875vw,3rem)] font-extrabold leading-[0.96] tracking-normal text-white">
            Dynamics Email Converter
          </h1>
          <p class="mt-5 max-w-2xl text-base font-medium leading-7 text-slate-300 md:text-lg">
            Convert third-party email HTML into Dynamics-ready structure directly in your browser.
          </p>
        </div>
        <div class="flex flex-wrap items-center gap-3">
          <nav class="flex rounded-lg border border-white/15 bg-white/10 p-1 shadow-sm backdrop-blur-[18px]" aria-label="Tool navigation">
            <a href="./validate.html" class="flex h-9 items-center justify-center rounded-md px-3 text-sm font-bold text-muted transition hover:bg-white/10 hover:text-white">
              Validator
            </a>
            <a href="./convert.html" aria-current="page" class="flex h-9 items-center justify-center rounded-md bg-accentSoft px-3 text-sm font-bold text-accent">
              Converter
            </a>
          </nav>
          <a class="flex h-11 items-center justify-center rounded-lg border border-white/15 bg-white/10 px-4 text-sm font-bold text-white shadow-sm transition hover:border-accent hover:text-accent" href="https://github.com/mylokaye/Form-email-validator">
            View on GitHub
          </a>
        </div>
      </header>

      <section class="grid items-stretch gap-5 xl:grid-cols-[minmax(0,1fr)_minmax(0,1fr)_360px]">
        <section class="flex min-h-[620px] flex-col overflow-hidden rounded-lg border border-white/15 bg-panel shadow-soft backdrop-blur-[18px]">
          <div class="flex items-center justify-between gap-3 border-b border-line px-3 py-2">
            <h2 class="px-2 text-sm font-extrabold text-white">Original</h2>
            <div class="flex items-center gap-1">
              <button
                id="originalHtmlTab"
                type="button"
                data-original-tab="html"
                class="document-tab rounded-md px-3 py-2 text-sm font-bold transition"
              >
                HTML
              </button>
              <button
                id="originalPreviewTab"
                type="button"
                data-original-tab="preview"
                class="document-tab rounded-md px-3 py-2 text-sm font-bold transition"
              >
                Preview
              </button>
            </div>
          </div>
          <textarea
            id="originalHtml"
            class="min-h-0 flex-1 resize-none bg-black/20 p-4 font-mono text-[13px] leading-5 text-slate-100 outline-none placeholder:text-slate-500"
            placeholder="Paste third-party email HTML here."
            spellcheck="false"
          ></textarea>
          <iframe id="originalPreview" class="hidden h-full min-h-0 flex-1 bg-white" title="Original preview" sandbox="" referrerpolicy="no-referrer"></iframe>
        </section>

        <section class="flex min-h-[620px] flex-col overflow-hidden rounded-lg border border-white/15 bg-panel shadow-soft backdrop-blur-[18px]">
          <div class="flex items-center justify-between gap-3 border-b border-line px-3 py-2">
            <h2 class="px-2 text-sm font-extrabold text-white">Converted</h2>
            <div class="flex items-center gap-1">
              <button
                id="convertedHtmlTab"
                type="button"
                data-converted-tab="html"
                class="document-tab rounded-md px-3 py-2 text-sm font-bold transition"
              >
                HTML
              </button>
              <button
                id="convertedPreviewTab"
                type="button"
                data-converted-tab="preview"
                class="document-tab rounded-md px-3 py-2 text-sm font-bold transition"
              >
                Preview
              </button>
            </div>
            <span id="malformedBadge" class="hidden rounded-full border border-amber-200 bg-amber-50 px-3 py-1 text-xs font-bold text-amber-800">
              Broken HTML
            </span>
          </div>
          <textarea
            id="convertedHtml"
            class="min-h-0 flex-1 resize-none bg-black/20 p-4 font-mono text-[13px] leading-5 text-slate-100 outline-none placeholder:text-slate-500"
            placeholder="Converted HTML appears here."
            spellcheck="false"
          ></textarea>
          <iframe id="convertedPreview" class="hidden h-full min-h-0 flex-1 bg-white" title="Converted preview" sandbox="" referrerpolicy="no-referrer"></iframe>
        </section>

        <aside class="flex min-h-[620px] flex-col gap-4">
          <section class="shrink-0 rounded-lg border border-white/15 bg-panel p-4 shadow-soft backdrop-blur-[18px]">
            <div class="grid grid-cols-2 gap-3">
              <button data-action="full" class="pipeline-button flex w-full items-center justify-center gap-2">
                <i data-lucide="wand-sparkles" class="h-4 w-4"></i>
                <span>Convert</span>
              </button>
              <button id="copyButton" class="flex h-11 w-full items-center justify-center gap-2 rounded-lg border border-accent bg-accent px-4 text-sm font-bold text-[#061014] shadow-control transition hover:bg-cyan-200 disabled:cursor-not-allowed disabled:border-white/10 disabled:bg-white/10 disabled:text-slate-500 disabled:shadow-none">
                <i data-lucide="copy" class="h-4 w-4"></i>
                <span>Copy</span>
              </button>
            </div>
            <button id="refreshButton" class="mt-3 flex h-11 w-full items-center justify-center gap-2 rounded-lg border border-white/15 bg-white/10 px-4 text-sm font-bold text-white shadow-sm transition hover:border-accent hover:text-accent disabled:cursor-not-allowed disabled:border-white/10 disabled:bg-white/10 disabled:text-slate-500 disabled:shadow-none">
              <i data-lucide="refresh-cw" class="h-4 w-4"></i>
              <span>Refresh</span>
            </button>
            <p id="statusText" class="mt-3 hidden text-xs text-muted"></p>
          </section>

          <section class="flex min-h-0 flex-1 flex-col overflow-hidden rounded-lg border border-white/15 bg-panel shadow-soft backdrop-blur-[18px]">
            <div class="flex items-center justify-between gap-3 border-b border-line px-3 py-2">
              <div class="flex items-center gap-1">
                <button
                  id="summaryTab"
                  type="button"
                  data-detail-tab="summary"
                  class="detail-tab rounded-md px-3 py-2 text-sm font-bold transition"
                >
                  Summary
                </button>
                <button
                  id="warningsTab"
                  type="button"
                  data-detail-tab="warnings"
                  class="detail-tab rounded-md px-3 py-2 text-sm font-bold transition"
                >
                  Warnings
                </button>
              </div>
              <span id="warningCount" class="rounded-full bg-white/10 px-2.5 py-1 text-xs font-bold text-muted shadow-sm">0</span>
            </div>
            <div id="summaryPanel" class="min-h-0 flex-1 overflow-auto p-4">
              <dl id="summaryRows" class="grid gap-2"></dl>
            </div>
            <div id="warningsPanel" class="hidden min-h-0 flex-1 overflow-auto p-3">
              <p class="px-1 py-2 text-sm text-muted">No warnings or errors yet.</p>
            </div>
          </section>
        </aside>
      </section>

      <div id="errorBox" class="hidden rounded-lg border border-red-300/40 bg-red-500/15 px-4 py-3 text-sm font-semibold text-red-100"></div>

      <footer class="mt-auto rounded-lg border border-white/10 bg-white/[0.04] px-4 py-4 text-sm text-slate-300 shadow-sm backdrop-blur-[18px]">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <p class="font-semibold text-white">Copyright Pattens 2026</p>
          <div class="flex flex-wrap items-center gap-x-4 gap-y-2">
            <a href="https://mylokaye.info" class="font-bold text-muted transition hover:text-accent">Built by Mylo Kaye</a>
          </div>
        </div>
      </footer>
    </main>

    <script src="./app.js?v=20260611-designer-meta"></script>
  </body>
</html>
