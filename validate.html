<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Email Validator - Static</title>
    <meta name="description" content="Paste or upload email addresses and validate them directly in your browser.">
    <meta name="theme-color" content="#0f172a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', "Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              mono: ['"JetBrains Mono"', "SFMono-Regular", "ui-monospace", "monospace"]
            },
            colors: {
              ink: "#f8fafc",
              muted: "#cbd5e1",
              line: "rgba(255,255,255,0.12)",
              panel: "rgba(8,13,25,0.72)",
              accent: "#67e8f9",
              accentSoft: "rgba(103,232,249,0.10)"
            },
            boxShadow: {
              soft: "0 24px 80px rgba(0, 0, 0, 0.34)",
              control: "0 14px 38px rgba(103, 232, 249, 0.22)"
            }
          }
        }
      };
    </script>
    <style>
      @keyframes drift {
        to {
          transform: translate3d(6vw, 4vh, 0) scale(1.08);
        }
      }

      .background-container {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .gradients-container {
        position: absolute;
        inset: -20%;
        opacity: 0.52;
        filter: blur(72px);
      }

      .gradient-orb {
        position: absolute;
        width: 34vw;
        min-width: 260px;
        aspect-ratio: 1;
        border-radius: 999px;
        mix-blend-mode: screen;
        animation: drift 18s ease-in-out infinite alternate;
      }

      .gradient-orb-1 {
        left: 4%;
        top: 8%;
        background: #14b8a6;
      }

      .gradient-orb-2 {
        right: 8%;
        top: 6%;
        background: #6366f1;
        animation-delay: -4s;
      }

      .gradient-orb-3 {
        left: 30%;
        bottom: 4%;
        background: #f59e0b;
        animation-delay: -8s;
      }

      .gradient-orb-4 {
        right: 18%;
        bottom: 18%;
        background: #ec4899;
        animation-delay: -12s;
      }

      .gradient-orb-5 {
        left: 50%;
        top: 28%;
        background: #38bdf8;
        animation-delay: -16s;
      }

      .bottom-gradient {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        height: 24vh;
        background: linear-gradient(to top, rgba(20, 184, 166, 0.2), transparent);
      }

      .bottom-glow-orb {
        position: absolute;
        bottom: -20vh;
        left: 50%;
        width: min(760px, 90vw);
        height: 34vh;
        border-radius: 50%;
        background: rgba(45, 212, 191, 0.22);
        filter: blur(56px);
        transform: translateX(-50%);
      }
    </style>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  </head>
  <body class="min-h-screen overflow-x-hidden bg-[radial-gradient(circle_at_50%_100%,rgba(20,184,166,0.18),transparent_34%),linear-gradient(135deg,#070a12_0%,#111827_48%,#1a1024_100%)] font-sans text-ink antialiased">
    <div class="background-container">
      <div class="gradients-container">
        <div class="gradient-orb gradient-orb-1"></div>
        <div class="gradient-orb gradient-orb-2"></div>
        <div class="gradient-orb gradient-orb-3"></div>
        <div class="gradient-orb gradient-orb-4"></div>
        <div class="gradient-orb gradient-orb-5"></div>
      </div>
      <div class="bottom-gradient"></div>
      <div class="bottom-glow-orb"></div>
    </div>

    <main class="relative z-10 mx-auto flex min-h-screen max-w-[1440px] flex-col gap-8 px-5 py-7 lg:px-10">
      <header class="flex flex-col gap-5 pb-2 lg:flex-row lg:items-start lg:justify-between">
        <div>
          <a href="https://pattens.tech" class="inline-flex items-center">
            <img src="./assets/pattens-white.svg" alt="Pattens Logo" class="h-auto w-[180px] max-w-[42vw]">
          </a>
          <h1 class="mt-12 max-w-4xl text-[clamp(2.5rem,2.875vw,3rem)] font-extrabold leading-[0.96] tracking-normal text-white">
            Contact List Verification
          </h1>
          <p class="mt-5 max-w-2xl text-base font-medium leading-7 text-slate-300 md:text-lg">
            Paste email addresses or upload a CSV, then check syntax and duplicate entries directly in your browser.
          </p>
        </div>
        <div class="flex flex-wrap items-center gap-3">
          <nav class="flex rounded-lg border border-white/15 bg-white/10 p-1 shadow-sm backdrop-blur-[18px]" aria-label="Tool navigation">
            <a href="./validate.html" aria-current="page" class="flex h-9 items-center justify-center rounded-md bg-accentSoft px-3 text-sm font-bold text-accent">
              Validator
            </a>
            <a href="./convert.html" class="flex h-9 items-center justify-center rounded-md px-3 text-sm font-bold text-muted transition hover:bg-white/10 hover:text-white">
              Converter
            </a>
          </nav>
          <a class="flex h-11 items-center justify-center rounded-lg border border-white/15 bg-white/10 px-4 text-sm font-bold text-white shadow-sm transition hover:border-accent hover:text-accent" href="https://github.com/mylokaye/Form-email-validator">
            View on GitHub
          </a>
        </div>
      </header>

      <section class="grid items-stretch gap-5 xl:grid-cols-[minmax(0,1fr)_360px]">
        <section class="flex min-h-[620px] flex-col overflow-hidden rounded-lg border border-white/15 bg-panel shadow-soft backdrop-blur-[18px]">
          <div class="flex flex-wrap items-center justify-between gap-3 border-b border-line px-3 py-2">
            <h2 class="px-2 text-sm font-extrabold text-white">Emails</h2>
            <div class="flex items-center gap-2">
              <span id="inputCount" class="rounded-full bg-white/10 px-2.5 py-1 text-xs font-bold text-muted shadow-sm">0 found</span>
              <button id="sampleButton" type="button" class="rounded-md px-3 py-2 text-sm font-bold text-muted transition hover:bg-white/10 hover:text-white">
                Sample
              </button>
            </div>
          </div>
          <textarea
            id="emailInput"
            class="min-h-0 flex-1 resize-none bg-black/20 p-4 font-mono text-[13px] leading-5 text-slate-100 outline-none placeholder:text-slate-500"
            placeholder="Paste emails here, one per line, comma-separated, or copied from a CSV.&#10;&#10;alex@example.com&#10;jordan@example.co.uk&#10;invalid@@example.com"
            spellcheck="false"
          ></textarea>
        </section>

        <aside class="flex min-h-[620px] flex-col gap-4">
          <section class="shrink-0 rounded-lg border border-white/15 bg-panel p-4 shadow-soft backdrop-blur-[18px]">
            <div class="grid grid-cols-2 gap-3">
              <button id="validateButton" class="flex h-11 w-full items-center justify-center gap-2 rounded-lg border border-accent bg-accent px-4 text-sm font-bold text-[#061014] shadow-control transition hover:bg-cyan-200 disabled:cursor-not-allowed disabled:border-white/10 disabled:bg-white/10 disabled:text-slate-500 disabled:shadow-none">
                <i data-lucide="check-circle-2" class="h-4 w-4"></i>
                <span>Validate</span>
              </button>
              <button id="uploadButton" class="flex h-11 w-full items-center justify-center gap-2 rounded-lg border border-white/15 bg-white/10 px-4 text-sm font-bold text-white shadow-sm transition hover:border-accent hover:text-accent">
                <i data-lucide="upload" class="h-4 w-4"></i>
                <span>Upload</span>
              </button>
            </div>
            <input id="fileInput" class="hidden" type="file" accept=".csv,text/csv">
            <div class="mt-3 grid grid-cols-2 gap-3">
              <button id="downloadButton" disabled class="flex h-11 w-full items-center justify-center gap-2 rounded-lg border border-white/15 bg-white/10 px-4 text-sm font-bold text-white shadow-sm transition hover:border-accent hover:text-accent disabled:cursor-not-allowed disabled:border-white/10 disabled:bg-white/10 disabled:text-slate-500 disabled:shadow-none">
                <i data-lucide="download" class="h-4 w-4"></i>
                <span>CSV</span>
              </button>
              <button id="clearButton" class="flex h-11 w-full items-center justify-center gap-2 rounded-lg border border-white/15 bg-white/10 px-4 text-sm font-bold text-white shadow-sm transition hover:border-accent hover:text-accent">
                <i data-lucide="trash-2" class="h-4 w-4"></i>
                <span>Clear</span>
              </button>
            </div>
            <p id="statusText" class="mt-3 hidden text-xs text-muted"></p>
          </section>

          <section class="flex min-h-0 flex-1 flex-col overflow-hidden rounded-lg border border-white/15 bg-panel shadow-soft backdrop-blur-[18px]">
            <div class="flex items-center justify-between gap-3 border-b border-line px-3 py-2">
              <div class="flex items-center gap-1">
                <button
                  id="summaryTab"
                  type="button"
                  data-detail-tab="summary"
                  class="detail-tab rounded-md px-3 py-2 text-sm font-bold transition"
                >
                  Summary
                </button>
                <button
                  id="reportTab"
                  type="button"
                  data-detail-tab="report"
                  class="detail-tab rounded-md px-3 py-2 text-sm font-bold transition"
                >
                  Report
                </button>
              </div>
              <span id="validRateBadge" class="rounded-full bg-white/10 px-2.5 py-1 text-xs font-bold text-muted shadow-sm">0%</span>
            </div>
            <div id="summaryPanel" class="min-h-0 flex-1 overflow-auto p-4">
              <dl id="summaryRows" class="grid gap-2"></dl>
            </div>
            <div id="reportPanel" class="hidden min-h-0 flex-1 overflow-auto p-3">
              <p class="px-1 py-2 text-sm text-muted">No validation results yet.</p>
            </div>
          </section>
        </aside>
      </section>

      <div id="errorBox" class="hidden rounded-lg border border-red-300/40 bg-red-500/15 px-4 py-3 text-sm font-semibold text-red-100"></div>

      <footer class="mt-auto rounded-lg border border-white/10 bg-white/[0.04] px-4 py-4 text-sm text-slate-300 shadow-sm backdrop-blur-[18px]">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <p class="font-semibold text-white">Copyright Pattens 2026</p>
          <div class="flex flex-wrap items-center gap-x-4 gap-y-2">
            <a href="./validate.html" class="font-bold text-muted transition hover:text-accent">Validator</a>
            <a href="./convert.html" class="font-bold text-muted transition hover:text-accent">Converter</a>
            <a href="https://mylokaye.info" class="font-bold text-muted transition hover:text-accent">Built by Mylo Kaye</a>
          </div>
        </div>
      </footer>
    </main>

    <script>
      const MAX_FILE_SIZE = 5 * 1024 * 1024;
      const MAX_EMAILS = 300;
      const MAX_EMAIL_LENGTH = 254;
      const MAX_LOCAL_PART_LENGTH = 64;

      const state = {
        results: [],
        summary: {
          total: 0,
          valid: 0,
          invalid: 0,
          duplicate: 0,
          validRate: 0
        }
      };

      const els = {
        emailInput: document.getElementById("emailInput"),
        inputCount: document.getElementById("inputCount"),
        sampleButton: document.getElementById("sampleButton"),
        validateButton: document.getElementById("validateButton"),
        uploadButton: document.getElementById("uploadButton"),
        fileInput: document.getElementById("fileInput"),
        downloadButton: document.getElementById("downloadButton"),
        clearButton: document.getElementById("clearButton"),
        statusText: document.getElementById("statusText"),
        summaryTab: document.getElementById("summaryTab"),
        reportTab: document.getElementById("reportTab"),
        summaryPanel: document.getElementById("summaryPanel"),
        reportPanel: document.getElementById("reportPanel"),
        summaryRows: document.getElementById("summaryRows"),
        validRateBadge: document.getElementById("validRateBadge"),
        errorBox: document.getElementById("errorBox")
      };

      els.emailInput.addEventListener("input", () => {
        clearError();
        updateInputCount();
      });
      els.sampleButton.addEventListener("click", loadSample);
      els.validateButton.addEventListener("click", validateCurrentInput);
      els.uploadButton.addEventListener("click", () => els.fileInput.click());
      els.fileInput.addEventListener("change", loadUploadedFile);
      els.downloadButton.addEventListener("click", downloadCSV);
      els.clearButton.addEventListener("click", clearValidator);
      els.summaryTab.addEventListener("click", () => setActiveDetails("summary"));
      els.reportTab.addEventListener("click", () => setActiveDetails("report"));

      init();

      function init() {
        renderSummary();
        setActiveDetails("summary");
        updateInputCount();
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }

      function loadSample() {
        els.emailInput.value = [
          "alex@example.com",
          "jordan@example.co.uk",
          "bad@@example.com",
          "missing-domain@",
          "alex@example.com",
          "name.surname+pattens@sub.example.org"
        ].join("\n");
        updateInputCount();
        validateCurrentInput();
      }

      async function loadUploadedFile(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) {
          return;
        }

        clearError();
        setStatus(`Loading ${file.name}...`);

        try {
          if (file.size > MAX_FILE_SIZE) {
            throw new Error("File too large. Maximum size is 5MB.");
          }

          const text = await file.text();
          els.emailInput.value = text;
          updateInputCount();
          validateCurrentInput();
        } catch (error) {
          showError(error.message || "Unable to read the selected file.");
        } finally {
          setStatus("");
          els.fileInput.value = "";
        }
      }

      function validateCurrentInput() {
        clearError();
        const rawEmails = extractEmailsFromText(els.emailInput.value);

        if (rawEmails.length === 0) {
          showError("Paste or upload at least one email address.");
          return;
        }

        if (rawEmails.length > MAX_EMAILS) {
          showError("Input exceeds the 300 email limit.");
          return;
        }

        setStatus("Validating emails...");
        const result = validateEmails(rawEmails);
        state.results = result.emails;
        state.summary = result.summary;
        renderSummary();
        renderReport();
        setActiveDetails("summary");
        els.downloadButton.disabled = state.results.length === 0;
        setStatus("");
      }

      function clearValidator() {
        els.emailInput.value = "";
        state.results = [];
        state.summary = {
          total: 0,
          valid: 0,
          invalid: 0,
          duplicate: 0,
          validRate: 0
        };
        els.downloadButton.disabled = true;
        clearError();
        setStatus("");
        updateInputCount();
        renderSummary();
        renderReport();
        setActiveDetails("summary");
      }

      function extractEmailsFromText(text) {
        const rows = parseCSV(text);
        const emails = [];

        rows.forEach(row => {
          row.forEach(field => {
            String(field)
              .split(/[\s;]+/)
              .map(value => sanitizeEmail(value))
              .filter(Boolean)
              .forEach(candidate => emails.push(candidate));
          });
        });

        return emails;
      }

      function parseCSV(text) {
        const rows = [];
        let row = [];
        let field = "";
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
          const char = text[i];
          const next = text[i + 1];

          if (char === '"' && inQuotes && next === '"') {
            field += '"';
            i++;
          } else if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === "," && !inQuotes) {
            row.push(field);
            field = "";
          } else if ((char === "\n" || char === "\r") && !inQuotes) {
            if (char === "\r" && next === "\n") i++;
            row.push(field);
            if (row.some(value => value.trim() !== "")) rows.push(row);
            row = [];
            field = "";
          } else {
            field += char;
          }
        }

        row.push(field);
        if (row.some(value => value.trim() !== "")) rows.push(row);
        return rows;
      }

      function sanitizeEmail(email) {
        return String(email || "")
          .replace(/[<>"';\\]/g, "")
          .replace(/[\r\n\t]/g, "")
          .trim();
      }

      function validateEmails(emails) {
        const seen = new Set();
        const emailResults = [];
        let validCount = 0;
        let invalidCount = 0;
        let duplicateCount = 0;

        emails.forEach(email => {
          const normalized = email.toLowerCase();

          if (seen.has(normalized)) {
            duplicateCount++;
            emailResults.push({
              email,
              status: "Duplicate",
              valid: false
            });
            return;
          }

          seen.add(normalized);
          const valid = isValidEmailSyntax(email);

          if (valid) {
            validCount++;
          } else {
            invalidCount++;
          }

          emailResults.push({
            email,
            status: valid ? "Valid" : "Invalid",
            valid
          });
        });

        const checkedTotal = validCount + invalidCount;
        const validRate = checkedTotal > 0 ? Math.round((validCount / checkedTotal) * 100) : 0;

        return {
          summary: {
            total: emailResults.length,
            checked: checkedTotal,
            valid: validCount,
            invalid: invalidCount,
            duplicate: duplicateCount,
            validRate
          },
          emails: emailResults
        };
      }

      function isValidEmailSyntax(email) {
        if (!email || typeof email !== "string") return false;
        if (email.length > MAX_EMAIL_LENGTH) return false;
        if ((email.match(/@/g) || []).length !== 1) return false;
        if (email.includes("..")) return false;

        const [localPart, domainPart] = email.split("@");
        if (!localPart || !domainPart) return false;
        if (localPart.length > MAX_LOCAL_PART_LENGTH) return false;
        if (!/^[a-zA-Z0-9._+-]+$/.test(localPart)) return false;
        if (localPart.startsWith(".") || localPart.endsWith(".")) return false;
        if (!domainPart.includes(".")) return false;
        if (!/^[a-zA-Z0-9.-]+$/.test(domainPart)) return false;
        if (domainPart.startsWith(".") || domainPart.endsWith(".")) return false;
        if (domainPart.startsWith("-") || domainPart.endsWith("-")) return false;

        const labels = domainPart.split(".");
        if (labels.some(label => !label || label.startsWith("-") || label.endsWith("-"))) return false;

        const tld = labels[labels.length - 1];
        return /^[a-zA-Z]{2,63}$/.test(tld);
      }

      function renderSummary() {
        const rows = [
          ["Emails found", state.summary.total || 0],
          ["Checked", state.summary.checked || 0],
          ["Valid", state.summary.valid || 0, "text-emerald-300"],
          ["Invalid", state.summary.invalid || 0, "text-red-300"],
          ["Duplicates", state.summary.duplicate || 0, "text-amber-200"]
        ];

        els.validRateBadge.textContent = `${state.summary.validRate || 0}%`;
        els.summaryRows.innerHTML = rows.map(([label, value, valueClass = "text-white"]) => `
          <div class="flex items-center justify-between gap-4 rounded-lg border border-white/10 bg-white/[0.04] px-3 py-3">
            <dt class="text-sm font-semibold text-muted">${label}</dt>
            <dd class="text-sm font-extrabold ${valueClass}">${value}</dd>
          </div>
        `).join("");
      }

      function renderReport() {
        if (!state.results.length) {
          els.reportPanel.innerHTML = '<p class="px-1 py-2 text-sm text-muted">No validation results yet.</p>';
          return;
        }

        els.reportPanel.innerHTML = `
          <div class="grid gap-2">
            ${state.results.map(item => {
              const badgeClass = item.status === "Valid"
                ? "border-emerald-300/40 bg-emerald-400/15 text-emerald-200"
                : item.status === "Duplicate"
                  ? "border-amber-300/40 bg-amber-400/15 text-amber-100"
                  : "border-red-300/40 bg-red-400/15 text-red-100";

              return `
                <div class="flex min-w-0 items-center justify-between gap-3 rounded-lg border border-white/10 bg-white/[0.04] px-3 py-2">
                  <span class="min-w-0 truncate font-mono text-[12px] leading-5 text-slate-100" title="${escapeHtml(item.email)}">${escapeHtml(item.email)}</span>
                  <span class="shrink-0 rounded-full border px-2.5 py-1 text-[11px] font-extrabold ${badgeClass}">${item.status}</span>
                </div>
              `;
            }).join("")}
          </div>
        `;
      }

      function updateInputCount() {
        const count = extractEmailsFromText(els.emailInput.value).length;
        els.inputCount.textContent = `${count} found`;
      }

      function setActiveDetails(active) {
        const isSummary = active === "summary";
        els.summaryPanel.classList.toggle("hidden", !isSummary);
        els.reportPanel.classList.toggle("hidden", isSummary);
        setTabState(els.summaryTab, isSummary);
        setTabState(els.reportTab, !isSummary);
      }

      function setTabState(tab, active) {
        tab.classList.toggle("bg-accentSoft", active);
        tab.classList.toggle("text-accent", active);
        tab.classList.toggle("text-muted", !active);
        tab.classList.toggle("hover:bg-white/10", !active);
        tab.classList.toggle("hover:text-white", !active);
      }

      function downloadCSV() {
        if (!state.results.length) {
          showError("No validation results found.");
          return;
        }

        let csvContent = "Email,Status\n";
        state.results.forEach(item => {
          csvContent += `${escapeCSVField(item.email)},${escapeCSVField(item.status)}\n`;
        });

        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const timestamp = new Date().toISOString().split("T")[0];
        const url = URL.createObjectURL(blob);

        link.setAttribute("href", url);
        link.setAttribute("download", `email-report-${timestamp}.csv`);
        link.style.visibility = "hidden";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }

      function escapeCSVField(field) {
        if (field == null) return "";
        const str = String(field);
        if (str.includes(",") || str.includes('"') || str.includes("\n") || str.includes("\r")) {
          return '"' + str.replace(/"/g, '""') + '"';
        }
        return str;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function setStatus(message) {
        if (!message) {
          els.statusText.textContent = "";
          els.statusText.classList.add("hidden");
          return;
        }

        els.statusText.textContent = message;
        els.statusText.classList.remove("hidden");
      }

      function showError(message) {
        els.errorBox.textContent = message;
        els.errorBox.classList.remove("hidden");
      }

      function clearError() {
        els.errorBox.textContent = "";
        els.errorBox.classList.add("hidden");
      }
    </script>
  </body>
</html>
